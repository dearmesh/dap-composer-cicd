steps:
  # Step 1: Clone the repository 
  - id: "Clone Repository"
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Cloning repository from GitHub..."
        git clone https://github.com/dearmesh/dap-composer-cicd.git /workspace/dap-composer-cicd
        cd /workspace/dap-composer-cicd
        echo "Checking out branch $_BRANCH_NAME"
        git checkout $_BRANCH_NAME
        echo "Repository cloned and branch checked out to $_BRANCH_NAME."


  # Step 2: Run all SP files in the QUERY/SP folder
  - id: "Run All SPs"
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Running all SP files in the QUERY/SP folder..."
        SP_FOLDER="/workspace/dap-composer-cicd/QUERY/SP"
        if [ ! -d "$$SP_FOLDER" ]; then
          echo "SP folder not found: $$SP_FOLDER"
          exit 1
        fi

        # Loop through all .sql files in the folder
        for sql_file in "$$SP_FOLDER"/*.sql; do
          if [ -f "$$sql_file" ]; then
            sp_name=$(basename "$$sql_file" .sql) # Extract SP name
            echo "Running stored procedure: $$sp_name"
            bq query --project_id=$PROJECT_ID --use_legacy_sql=false $(cat $$SP_FOLDER)
          else
            echo "No .sql files found in $$SP_FOLDER"
            exit 0
          fi
        done
        echo "All SP files have been run successfully."

