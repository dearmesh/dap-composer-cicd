steps:
  # Step 1: Clone the repository 
  - id: "Clone Repository"
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Cloning repository from GitHub..."
        git clone https://github.com/dearmesh/dap-composer-cicd.git /workspace/dap-composer-cicd
        cd /workspace/dap-composer-cicd
        echo "Checking out branch $_BRANCH_NAME"
        git checkout $_BRANCH_NAME
        echo "Repository cloned and branch checked out to $_BRANCH_NAME."

  # Step 2: Check for changes in the QUERY/SP folder
  - id: "Detect-Changes"
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Checking for changes in the QUERY/SP folder..."
        if ! git diff --name-only HEAD~1 HEAD | grep '^QUERY/SP/'; then
          echo "No changes in SP files. Exiting."
          exit 0
        fi
        echo "Changes detected in SP files. Proceeding to deployment."

  # Step 3: Deploy the changed SP files to BigQuery
  - id: "Deploy SPs"
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Deploying changed SP files..."
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^QUERY/SP/.*\.sql')
        if [ -z "${CHANGED_FILES}" ]; then
          echo "No valid SP files to deploy."
          exit 0
        fi
        echo "${CHANGED_FILES}" > /workspace/changed_files.txt
        while IFS= read -r sql_file; do
          if [ -f "${sql_file}" ]; then
            echo "Deploying ${sql_file}"
            gcloud bq query --project_id=$PROJECT_ID --use_legacy_sql=false --file="${sql_file}"
          else
            echo "File ${sql_file} no longer exists."
          fi
        done < /workspace/changed_files.txt
        echo "Deployment complete."

  # Step 4: Run the changed stored procedures for validation
  - id: "Run SPs"
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Validating SPs by running them..."
        if [ ! -s /workspace/changed_files.txt ]; then
          echo "No SP files to validate."
          exit 0
        fi
        while IFS= read -r sql_file; do
          if [ -f "${sql_file}" ]; then
            sp_name=$(basename "${sql_file}" .sql) # Extract SP name
            echo "Running stored procedure: ${sp_name}"
            gcloud bq query --project_id=$PROJECT_ID --use_legacy_sql=false --query="CALL dataset_name.${sp_name}();"
          else
            echo "File ${sql_file} no longer exists."
          fi
        done < /workspace/changed_files.txt
        echo "Stored procedure validation complete."

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _BRANCH_NAME: "main"
