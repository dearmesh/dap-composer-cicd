main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: dm_sum_portfolio_lending_cust_movement
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE TABLE IF NOT EXISTS v_dataset_id.dm_sum_portfolio_lending_cust_movement
    (
      cif_funding INT64,
      ecif INT64,
      acctcust INT64,
      product_holding STRING,
      maturity_date DATE,
      month_first_ph DATE,
      date_movement_ph DATE,
      flag_ph STRING,
      movement_interval_ph INT,
      osbal_mm0 NUMERIC,
      osbal_mm1 NUMERIC,
      osbal_mm2 NUMERIC,
      osbal_mm3 NUMERIC,
      osbal_mm4 NUMERIC,
      osbal_mm5 NUMERIC,
      osbal_mm6 NUMERIC,
      osbal_mm7 NUMERIC,
      osbal_mm8 NUMERIC,
      osbal_mm9 NUMERIC,
      osbal_mm10 NUMERIC,
      osbal_mm11 NUMERIC,
      osbal_mm12 NUMERIC,
      avbal_mm0 NUMERIC,
      avbal_mm1 NUMERIC,
      avbal_mm2 NUMERIC,
      avbal_mm3 NUMERIC,
      avbal_mm4 NUMERIC,
      avbal_mm5 NUMERIC,
      avbal_mm6 NUMERIC,
      avbal_mm7 NUMERIC,
      avbal_mm8 NUMERIC,
      avbal_mm9 NUMERIC,
      avbal_mm10 NUMERIC,
      avbal_mm11 NUMERIC,
      avbal_mm12 NUMERIC,
      execution_date DATE,
      job_id STRING,
      job_id_date_format DATETIME,
      business_date DATE
    )
    PARTITION BY business_date
    CLUSTER BY cif_funding, product_holding

