#BIG QUERY CONFIGURATION
temp_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: unit_link_bi
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.unit_link_bi
    (
      ecifref numeric, 
      , cod_cust numeric, 
      , bank_account_no string 
      , acc string
      , policy_no string
      , bank_account_name string
      , cod_lob numeric 
      , brn_code_acc numeric 
      , brn_code_cif numeric 
      , danamon_branch_code string 
      , officer_code string
      , off_code_acc string
      , paid_to_date string
      , policy_status string 
      , status_desc string 
      , status_pol string 
      , currency_code string 
      , prod_date string 
      , effect_date string 
      , issue_date string 
      , iss_date_yyyymm string 
      , billing_date string 
      , payment_mode string 
      , policy_premium numeric 
      , sum_assured numeric 
      , payment_method string 
      , maturity_date string 
      , termination_date string 
      , nip string 
      , premium_duration string 
      , benefit_duration string 
      , basic_plan_com_code string 
      , basic_plan_name string 
      , a_name string 
      , last_payment_date string
      , next_due_date string 
      , cli_num string
      , beneficiary string 
      , aaji_code string 
      , o_name string
      , o_dob string
      , l_wa_cd_1_offcode string
      , servicing_agent_code string 
      , servicing_agent_name string 
      , writting_agent_code string 
      , writting_agent_name string 
      , o_gender string 
      , o_idnumber string 
      , o_relationship string 
      , o_address1 string
      , o_address2 string 
      , o_address3 string 
      , o_address4 string 
      , o_zip_code string 
      , a_gender string
      , a_idnumber string 
      , a_dob string 
      , a_address1 string
      , a_address2 string 
      , a_address3 string 
      , a_address4 string 
      , a_zip_code string 
      , fs_code string
      , reference_spaj string
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'CSV',
      field_delimiter = ';',
      null_marker = '\\N',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
      -- skip_leading_rows = 1
    );

