    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: fact_channel_trx_si_new
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE TABLE IF NOT EXISTS v_dataset_id.fact_channel_trx_si_new
    (
      channel_type STRING
      , cif NUMERIC
      , account_number STRING
      , prod_code NUMERIC
      , prod_name STRING
      , lob_code NUMERIC
      , lob_name STRING
      , trx_timestamp TIMESTAMP
      , trx_date DATE
      , trx_type STRING
      , dr_or_cr STRING
      , `result` STRING
      , no_of_trx INT64
      , amount_idr NUMERIC
      , amount_origin NUMERIC
      , ccynam_origin STRING
      , trx_description STRING
      , execution_date          DATE
      , job_id                  STRING
      , job_id_date_format      DATETIME
      , business_date           DATE
    )
    PARTITION BY business_date

