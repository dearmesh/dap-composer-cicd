main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: fact_dcc_cust_registration
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE TABLE IF NOT EXISTS v_dataset_id.fact_dcc_cust_registration
    (
      corp_id	STRING
      , host_cif_id	STRING
      , corp_name	STRING
      , cod_cust	NUMERIC
      , acct_no	STRING
      , acct_nm	STRING
      , cod_acct_title	STRING
      , is_inq	STRING
      , is_debit	STRING
      , is_crdt	STRING
      , debit_lmt	NUMERIC
      , inactive_sts	STRING
      , cod_acct_stat	NUMERIC
      , tax_id_no	STRING
      , addr_1	STRING
      , addr_2	STRING
      , addr_3	STRING
      , postcode_cd	STRING
      , ctry_cd	STRING
      , email_1	STRING
      , email_2	STRING
      , phone_no	STRING
      , fax_no	STRING
      , is_inactive	STRING
      , inactive_reason	STRING
      , is_delete	STRING
      , cam_setup	STRING
      , max_usr_count	NUMERIC
      , is_assign_to_mech	STRING
      , is_edit_repair	STRING
      , created_by	STRING
      , created_dt	TIMESTAMP
      , updated_by	STRING
      , updated_dt	TIMESTAMP
      , ids_sgm_cd	STRING
      , bus_unit_cd	STRING
      , pckg_cd	STRING
      , package	STRING
      , hndling_offcer_cd	STRING
      , new_cct_handler_method	STRING
      , business_size_cd	STRING
      , corp_adm_option	STRING
      , is_allow_edit_file_upload	STRING
      , last_login_dt	TIMESTAMP
      , EXECUTION_DATE          DATE
      , JOB_ID                  STRING
      , JOB_ID_DATE_FORMAT      DATETIME
      , BUSINESS_DATE            DATE
    )
    PARTITION BY BUSINESS_DATE

