main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: sum_trx_counterparty_cust
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE TABLE IF NOT EXISTS v_dataset_id.sum_trx_counterparty_cust
    (
      cif INT64,
      nam_cust_full STRING,
      trx_type STRING,
      trx_inout STRING,
      trx_ccy INT64,
      nam_ccy_short STRING,
      nam_ctparty STRING,
      cod_acct_no_ctparty STRING,
      bank_ctparty STRING,
      sum_not_trx INT64,
      sum_trx_amountidr NUMERIC,
      flag_to_self INT64,
      flag_have_danamon INT64,
      cif_bdi_ctparty INT64,
      execution_date DATE,
      job_id STRING,
      job_id_date_format DATETIME,
      business_date DATE
    )
    PARTITION BY business_date
    CLUSTER BY cif, trx_type

