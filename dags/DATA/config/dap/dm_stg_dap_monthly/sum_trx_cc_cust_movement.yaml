main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: sum_trx_cc_cust_movement
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE TABLE IF NOT EXISTS v_dataset_id.sum_trx_cc_cust_movement
    (
      cif_funding INT64,
      ecif INT64,
      cif_cc INT64,
      trx_type_level_2 STRING,
      flag_onus STRING,
      channel STRING,
      flag_transaction STRING,
      date_new_to_feature DATE,
      last_trx_date DATE,
      day_diff_last_trx INT64,
      not_feature INT64,
      amt_feature NUMERIC,
      cum_sum_not_feature INT64,
      cum_amt_feature NUMERIC,
      not_mm1 INT64,
      not_mm2 INT64,
      not_mm3 INT64,
      not_mm4 INT64,
      not_mm5 INT64,
      not_mm6 INT64,
      not_mm7 INT64,
      not_mm8 INT64,
      not_mm9 INT64,
      not_mm10 INT64,
      not_mm11 INT64,
      not_mm12 INT64,
      amt_mm1 NUMERIC,
      amt_mm2 NUMERIC,
      amt_mm3 NUMERIC,
      amt_mm4 NUMERIC,
      amt_mm5 NUMERIC,
      amt_mm6 NUMERIC,
      amt_mm7 NUMERIC,
      amt_mm8 NUMERIC,
      amt_mm9 NUMERIC,
      amt_mm10 NUMERIC,
      amt_mm11 NUMERIC,
      amt_mm12 NUMERIC,
      execution_date DATE,
      job_id STRING,
      job_id_date_format DATETIME,
      business_date DATE
    )
    PARTITION BY BUSINESS_DATE
    CLUSTER BY cif_funding,trx_type_level_2

