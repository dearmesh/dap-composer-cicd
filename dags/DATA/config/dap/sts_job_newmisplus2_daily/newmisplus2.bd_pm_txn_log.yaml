#BIG QUERY CONFIGURATION
temp_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: bd_pm_txn_log
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.bd_pm_txn_log
    (
    cod_org_brn numeric, 
    cod_org_bank numeric, 
    cod_user_id string, 
    dat_txn timestamp, 
    ctr_batch_no numeric, 
    ref_sys_tr_aud_no numeric, 
    ref_subseq_no numeric, 
    cod_payment_txn string, 
    cod_txn_mnemonic numeric, 
    dat_post timestamp, 
    dat_value timestamp, 
    cod_acct_no string, 
    cod_cust_id numeric, 
    cod_txn_ccy numeric, 
    amt_txn_tcy numeric, 
    rat_conv_tclcy numeric, 
    amt_txn_lcy numeric, 
    amt_txn_acy numeric, 
    rat_conv_aclcy numeric, 
    cod_agent_id string, 
    cod_network_id string, 
    ref_network_no string, 
    cod_auth_id string, 
    ref_txn_no string, 
    ref_usr_no string, 
    dat_dispatch timestamp, 
    dat_activation timestamp, 
    dat_ctrparty_value timestamp, 
    dat_ntwk_value timestamp, 
    dat_expiry timestamp, 
    pay_dir string, 
    acct_stat numeric, 
    msg_stat numeric, 
    txn_stat numeric, 
    ntwk_acct_stat numeric, 
    contg_acct_stat numeric, 
    cod_agreement_id string, 
    cod_reply numeric, 
    cod_ext string, 
    cod_srl_txt string, 
    cod_ctparty_id string, 
    cod_ctparty_acct string, 
    txt_txn_desc string, 
    flg_valuedate_processed string, 
    flg_ntwkdate_processed string, 
    flg_contg_processed string, 
    amt_tot_tcy numeric, 
    cod_fin_inst_id string, 
    cod_fin_inst_bank string, 
    cod_fin_inst_brn string, 
    cod_corresp_agent string, 
    ref_txn_no_rev string, 
    cod_entity_vpd numeric
    )    
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

