  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: bd_ba_ccy_code
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.bd_ba_ccy_code
    (
      cod_ccy	numeric,
      nam_ccy_short	string,
      nam_currency	string,
      txt_ccy_sym	string,
      txt_dec_ccy_sym	string,
      ctr_ccy_dec	numeric,
      cod_ccy_swift	numeric,
      nam_ccy_country	string,
      flg_ccy_conv	numeric,
      mlt_unit_rat_quot	numeric,
      rat_ccy_variance	numeric,
      nam_dec_ccy	string,
      nam_dec_ccy_short	string,
      nam_ccy_denom1	string,
      nam_ccy_denom2	string,
      nam_ccy_denom3	string,
      nam_ccy_denom4	string,
      nam_ccy_denom5	string,
      nam_ccy_denom6	string,
      nam_ccy_denom7	string,
      nam_ccy_denom8	string,
      nam_ccy_denom9	string,
      nam_ccy_denom10	string,
      nam_ccy_denom11	string,
      nam_ccy_denom12	string,
      nam_ccy_denom13	string,
      nam_ccy_denom14	string,
      nam_ccy_denom15	string,
      nam_ccy_denom16	string,
      nam_ccy_denom17	string,
      nam_ccy_denom18	string,
      nam_ccy_denom19	string,
      nam_ccy_denom20	string,
      ctr_ccy_denom1	numeric,
      ctr_ccy_denom2	numeric,
      ctr_ccy_denom3	numeric,
      ctr_ccy_denom4	numeric,
      ctr_ccy_denom5	numeric,
      ctr_ccy_denom6	numeric,
      ctr_ccy_denom7	numeric,
      ctr_ccy_denom8	numeric,
      ctr_ccy_denom9	numeric,
      ctr_ccy_denom10	numeric,
      ctr_ccy_denom11	numeric,
      ctr_ccy_denom12	numeric,
      ctr_ccy_denom13	numeric,
      ctr_ccy_denom14	numeric,
      ctr_ccy_denom15	numeric,
      ctr_ccy_denom16	numeric,
      ctr_ccy_denom17	numeric,
      ctr_ccy_denom18	numeric,
      ctr_ccy_denom19	numeric,
      ctr_ccy_denom20	numeric,
      amt_euro_chq_grnty	numeric,
      ctr_denm	numeric,
      ctr_ccy_round_to	numeric,
      flg_approved_ccy	string,
      cod_ccy_iso	numeric,
      flg_mnt_status	string,
      cod_mnt_action	string,
      cod_last_mnt_makerid	string,
      cod_last_mnt_chkrid	string,
      dat_last_mnt	timestamp,
      ctr_updat_srlno	numeric,
      ctr_ccy_float	numeric,
      ref_udf_no	string,
      ccy_sym_pos	string,
      cod_entity_vpd	numeric
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

