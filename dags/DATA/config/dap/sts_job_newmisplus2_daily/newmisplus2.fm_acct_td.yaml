#BIG QUERY CONFIGURATION
temp_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: fm_acct_td
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.fm_acct_td
    (
     load_timestamp timestamp, 
     as_of_date timestamp, 
     account_number string, 
     cif_key string, 
     iso_currency_cd string, 
     product_cd string, 
     product_typ string, 
     gl_account_id numeric, 
     bdi_gl_account_id_int_inc_exp numeric, 
     lob_code numeric ,
     ao_business string, 
     ao_operation string, 
     branch_cd numeric, 
     account_open_date timestamp, 
     value_date timestamp, 
     cur_net_rate numeric, 
     roll_over_td numeric, 
     account_status numeric, 
     ctr_dep_term numeric, 
     cross_sell string, 
     value_chain string, 
     balance_ori numeric, 
     balance_idr numeric, 
     maturity_date timestamp, 
     last_reprice_date timestamp, 
     next_reprice_date timestamp, 
     new_to_bank string, 
     new_to_product string, 
     region numeric, 
     account_close_date timestamp, 
     program string, 
     break_td string, 
     liquidity_premium numeric, 
     source_data string, 
     cust_name string, 
     remark4 string, 
     remark5 string, 
     product_code_ncbs string, 
     product_desc string, 
     branch_description string, 
     branch_regional numeric, 
     business_seg_cat numeric, 
     business_seg_typ string, 
     cod_prod_type string, 
     customer_type string, 
     rat_spl_nisbah numeric, 
     avg_mis numeric, 
     avg_daily_bal numeric
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

