#BIG QUERY CONFIGURATION
temp_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: bd_dcc_acct_acct
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.bd_dcc_acct_acct
    (
      load_timestamp	timestamp,
      acct_no	string,
      version	numeric,
      acct_nm	string,
      host_cust_id	string,
      is_db	string,
      is_cr	string,
      is_inq	string,
      is_parent_db	string,
      is_parent_cr	string,
      is_parent_inq	string,
      inactive_sts	string,
      inactive_rsn	string,
      inactive_by	string,
      inactive_dt	timestamp,
      created_by	string,
      created_dt	timestamp,
      updated_by	string,
      updated_dt	timestamp,
      branch_cd	string,
      country_cd	string,
      ccy_cd	string,
      acct_typ_cd	string,
      acct_prod_typ	string,
      atm_card_no	string,
      acct_relationship_typ	string,
      class	string
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

