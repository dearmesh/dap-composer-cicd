      , dat_pspt_issue timestamp 
      , dat_pspt_expiry timestamp 
      , ref_visa string 
      , txt_typ_visa string 
      , ctr_durtn_stay numeric
      , dat_visa_expiry timestamp 
      , txt_med_hist string 
      , txt_med_ins string 
      , flg_lgl_case string 
      , txt_lgl_case string 
      , txt_police_recrd string 
      , amt_val_house numeric 
      , txt_mort_assts string 
      , txt_val_mort string 
      , txt_cr_rating string 
      , dat_cr_rating timestamp 
      , nam_cr_card1 string 
      , ref_cr_card1 string 
