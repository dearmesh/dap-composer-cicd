      , ref_cust_emp_fax_area string 
      , ref_cust_emp_mobile string 
      , ref_cust_emp_email string 
      , cod_entity_vpd numeric
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION v_connection
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

