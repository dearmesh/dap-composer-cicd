  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: bd_dcc_pcc_corp
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.bd_dcc_pcc_corp
    (
    	 load_timestamp timestamp 
      , id string 
      , version numeric 
      , idx numeric 
      , nm string 
      , tax_id_no string 
      , host_cif_id string 
      , addr_1 string 
      , addr_2 string 
      , addr_3 string 
      , postcode_cd string 
      , email_1 string 
      , email_2 string 
      , phone_no string 
      , ext_no string 
      , fax_no string 
      , inactive_by string 
      , inactive_dt timestamp 
      , is_inactive string 
      , inactive_reason string 
      , is_delete string 
      , member_since timestamp 
      , spi_approle_cd string 
      , is_adm_outsourced string 
      , cam_setup string 
      , max_usr_count numeric 
      , auth_challenge_typ string 
      , is_assign_to_mech string 
      , is_edit_repair string 
      , is_auto_authorize string 
      , created_by string 
      , created_dt timestamp 
      , updated_by string 
      , updated_dt timestamp 
      , id_typ_cd string 
      , city_cd string 
      , branch_cd string 
      , state_cd string 
      , ctry_cd string 
      , substate_cd string 
      , ids_sgm_cd string 
      , bus_unit_cd string 
      , txnal_ch_process_mtd_cd string 
      , pckg_cd string 
      , hndling_offcer_cd string 
      , parent_corporate_fk string 
      , parent_id string 
      , new_cct_handler_method string 
      , business_size_cd string 
      , business_license string 
      , corp_adm_option string 
      , corp_type string 
      , remote_approval_challenge_type string 
      , is_allow_edit_file_upload string 
      , is_allow_remittance string
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

