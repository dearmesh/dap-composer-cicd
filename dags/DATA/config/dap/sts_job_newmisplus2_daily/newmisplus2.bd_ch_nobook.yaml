#BIG QUERY CONFIGURATION
temp_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: bd_ch_nobook
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.bd_ch_nobook
    (
    dat_txn timestamp, 
    cod_cc_brn_txn numeric, 
    cod_userno numeric, 
    ctr_batch_no numeric, 
    ref_sys_tr_aud_no numeric, 
    ref_sub_seq_no numeric, 
    cod_acct_no string, 
    txt_txn_desc string, 
    dat_value timestamp, 
    ref_chq_no string, 
    cod_drcr string, 
    cod_txn_mnemonic numeric, 
    cod_txn_literal string, 
    amt_txn numeric, 
    flg_pasbkupd string, 
    rat_ccy numeric, 
    cod_msg_typ numeric, 
    cod_proc numeric, 
    ctr_updat_srlno numeric, 
    dat_post timestamp, 
    amt_txn_tcy numeric, 
    cod_txn_ccy numeric, 
    rat_conv_tclcy numeric, 
    cod_sc numeric, 
    cod_auth_id string, 
    ref_card_no string, 
    ref_txn_no string, 
    ref_usr_no string, 
    cod_entity_vpd numeric    
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

