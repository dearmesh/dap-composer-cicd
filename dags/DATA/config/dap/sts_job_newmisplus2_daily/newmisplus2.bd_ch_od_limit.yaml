#BIG QUERY CONFIGURATION
temp_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: bd_ch_od_limit
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.bd_ch_od_limit
    (
     cod_acct_no string, 
     cod_limit_no numeric, 
     amt_limit numeric, 
     amt_drawing_power numeric, 
     dat_limit_start timestamp, 
     dat_limit_end timestamp, 
     flg_internal_fd string, 
     cod_secured string, 
     1cod_int_indx numeric, 
     1rat_int numeric, 
     1rat_var_acct numeric, 
     1rat_var_od numeric, 
     1rat_int_effective numeric, 
     1flg_mnt_status string, 
     1cod_mnt_action string, 
     1cod_last_mnt_makerid string, 
     1cod_last_mnt_chkrid string, 
     1dat_last_mnt timestamp, 
     2cod_renewal_mode string, 
     2dat_expiry_new timestamp, 
     2dat_last_renewal timestamp, 
     2ctr_period_in_days numeric, 
     2dat_process timestamp, 
     2cod_reason numeric, 
     2ctr_updat_srlno numeric, 
     2flg_rat_change_advice string, 
     2cod_entity_vpd numeric
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

