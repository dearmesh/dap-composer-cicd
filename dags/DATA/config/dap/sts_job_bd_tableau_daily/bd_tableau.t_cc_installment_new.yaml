main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: t_cc_installment_new
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.t_cc_installment_new
    (
    id string, 
    ops_mord_card_nbr string, 
    ops_mord_basic_card string, 
    crdacct string, 
    cdtype string, 
    ops_mord_delivery_date numeric, 
    ops_mord_pgm_code string, 
    ops_mord_instl_plan string, 
    ops_mord_nbr_inst_bill numeric, 
    ops_mord_amt numeric, 
    ops_mord_earm_amt numeric, 
    ops_mord_handling_fee numeric, 
    ops_mord_int_rate numeric, 
    ops_mord_int_total numeric, 
    tenor integer, 
    ops_mord_desc string, 
    ops_mord_ref numeric, 
    ops_mord_auth_code string, 
    typ string, 
    acctcust string, 
    principal string, 
    program string, 
    new_install string, 
    fl_rate string, 
    smtttxndte numeric, 
    smtttxncde numeric, 
    smttxnamt numeric, 
    smttpstdte numeric, 
    smttautcde string, 
    smttdesc string, 
    smttrefnbr string, 
    smttmccde numeric, 
    smttpdt numeric, 
    smttocurcd string, 
    smttocuram numeric, 
    smttstlcde string, 
    smttstlamt numeric, 
    smttfilbuf string, 
    smttmtind string, 
    smttbnknbr numeric, 
    smttmchnbr numeric, 
    ctry1 string, 
    smttrefnbr2 string, 
    ctry2 integer, 
    ncard_id string, 
    mech_nbr string, 
    txcddsc string, 
    txcdcrflg string, 
    flag_bca string, 
    cntry string, 
    periode string, 
    base string, 
    trxdesc string, 
    merchx string, 
    acctcrlmtp numeric, 
    merch_type string, 
    trx_type string, 
    location_ string, 
    online_source_merchant integer, 
    online_source_field integer, 
    online_source_keyin integer, 
    mcc_cat string, 
    trxdesc2 string, 
    trxdesc3 string, 
    trxdesc4 string, 
    merch string, 
    merch_grp string, 
    fl_svol string, 
    trxdesc_svol string, 
    merchant_cat_by_mcc_lvl2 string, 
    merchant_cat_by_mcc_lvl1 string, 
    ecifref string, 
    interest string, 
    admin_ string, 
    channel string, 
    offer string
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'CSV',
      field_delimiter = '\x01',
      null_marker = '\\N',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false,
      quote=''
    );

