main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: t_bonds
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.t_bonds
    (
      `no` numeric, 
      currencies string, 
      email_date timestamp, 
      id_no numeric, 
      customer_name string, 
      series string, 
      nominal numeric, 
      nominal_in_idr numeric, 
      price numeric, 
      coupon numeric, 
      nominal_coupon numeric, 
      proceed numeric, 
      net_proceed numeric, 
      fee_transaction bigint, 
      trade_date timestamp, 
      settlement_date timestamp, 
      sales_code string, 
      sales_code_acct string, 
      nip string, 
      nip_acct string, 
      sales_name string, 
      sales_name_acct string, 
      branch_code_rbs numeric, 
      branch_code bigint, 
      branch_code_acct bigint, 
      branch_name string, 
      branch_name_acct string, 
      bm_name string, 
      bm_name_acct string, 
      bm_code string, 
      bm_code_acct string, 
      am_name string, 
      am_name_acct string, 
      am_code string, 
      am_code_acct string, 
      is_name string, 
      is_name_acct string, 
      is_code string, 
      is_code_acct string, 
      region string, 
      region_acct string, 
      branch_target string, 
      branch_target_acct string, 
      cover numeric, 
      position string, 
      fb numeric, 
      fb_in_usd numeric, 
      fb_in_idr numeric, 
      rate numeric, 
      ta string, 
      total_fb_usd_bonds numeric, 
      total_fb_idr_bonds numeric, 
      total_all numeric, 
      cfo numeric, 
      wppe string, 
      status string, 
      ref_flag string, 
      branch_referral_flag string, 
      is_referral_flag string, 
      keterangan string, 
      account string, 
      cif string, 
      amount_branch_sls numeric, 
      amount_branch_acct numeric, 
      fb_branch_sls numeric, 
      fb_branch_acct numeric, 
      amount_is_sls numeric, 
      amount_is_acct numeric, 
      fb_is_sls numeric, 
      fb_is_acct numeric, 
      nti_flag string, 
      week_period string, 
      cek string, 
      trx_id string, 
      acct_no string, 
      lobs numeric, 
      off_code string, 
      is_code_2 string, 
      perc_a numeric, 
      perc_b numeric, 
      perc_c bigint, 
      lob numeric, 
      is_notes string, 
      indicator string, 
      oc_final string, 
      nip_oc_final string, 
      am_code_oc_final string, 
      am_name_oc_final string, 
      is_code_oc_final string, 
      is_name_oc_final string, 
      region_oc_final string
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

