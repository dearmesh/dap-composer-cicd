    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: t_dblink_bill   ## INI JANGAN DI PINDAHIN atau jadi NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: | ## INI JANGAN DI PINDAHIN atau jadi NONE
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.t_dblink_bill
    (
      id_billtemplate int
    , rekeningid_billtemplate int
    , institusiid_billtemplate int
    , ismanual_billtemplate bool
    , billcode_billtemplate string
    , billname_billtemplate string
    , note_billtemplate string
    , priority_billtemplate int
    , ispenalty_billtemplate bool
    , billpenaltyid int
    , isrecurring_billtemplate bool
    , isallowmanual_billtemplate bool
    , ispartial_billtemplate bool
    , repetition_billtemplate string
    , status_billtemplate string
    , isactive_billtemplate bool
    , recurringtype_billtemplate int
    , isgraceperiod_billtemplate bool
    , isterminateall_billtemplate bool
    , periodeduration_billtemplate int
    , datainduksiswaid_bill int
    , institusiid_bill int
    , nominal_bill numeric
    , nominalpartial_bill numeric
    , nominaldenda_bill numeric
    , tglbayar_bill timestamp
    , status_bill string
    , processby_bill int
    , processdate_bill timestamp
    , count_bill int
    , refnumber_bill string
    , action_bill string
    , remark_bill string
    , note_bill string
    , statusgpm_bill string
    , ispartial_bill bool
    , ismanual_bill bool
    , isupdate_bill bool
    , isactive_bill bool
    , ismerge_bill bool
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'PARQUET',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

