main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: dm_disburse_mortgage
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.dm_disburse_mortgage
    (
    loan_number   string, 
    debitur_shortname   string, 
    off_code   string, 
    officer_name   string, 
    branch_code   numeric, 
    branch_name   string, 
    product_type   numeric, 
    product_name   string, 
    region   string, 
    total_amount_disb   numeric, 
    os   numeric, 
    current_rate   numeric, 
    status   string, 
    source   string, 
    open_date   timestamp, 
    maturity_date   timestamp, 
    cif   numeric, 
    data_date   string, 
    total_face_amount_disb   numeric, 
    remitter_acct   string, 
    number_disbursed   numeric, 
    loan_tenor   numeric, 
    first_disb_dat   timestamp, 
    last_disb_dat   timestamp, 
    last_payment_dat   timestamp, 
    var_rate   numeric, 
    ops_code   string, 
    mis_product_code   string, 
    product_code_desc   string, 
    census_track   string, 
    program   string, 
    program_code_desc   string, 
    smsa1   string, 
    agent_code   string, 
    flag_covid   string, 
    covid_restructure_desc   string, 
    product_group   string, 
    mis_product_name   string, 
    product_name_desc   string, 
    mis_program_name   string, 
    bd_name   string, 
    bd_type   string, 
    nis   string, 
    sales_name   string, 
    nis_ref   string, 
    referal   string, 
    tag_tabel_sales   string, 
    source_branch   string, 
    tl_nis   string, 
    tl_name   string, 
    msm_nis   string, 
    msm_name   string, 
    channel_code   string, 
    channel_head   string, 
    smsa_refferal   string, 
    smsa_general_program   string, 
    smsa_analisa_income   string, 
    smsa_special_program   string, 
    smsa_other   string, 
    channel   string, 
    casid   string, 
    report_disburse_flag   integer, 
    casa_product_code   numeric, 
    cod_acct_no   string, 
    cod_cc_brn   numeric, 
    cod_lob   numeric, 
    casa_product_name   string, 
    casa_branch_code   numeric, 
    flg_psbook   string, 
    bal_book   numeric, 
    amt_hld   numeric, 
    bal_acct_min_reqd   numeric, 
    casa_status   numeric, 
    casa_status_desc   string, 
    funding_report_flag   string
    -- cod_crr_from   numeric, 
    -- cod_crr_to   numeric, 
    -- date_process_kolek   timestamp, 
    -- ctr_dpd   numeric, 
    -- date_process_dpd   timestamp, 
    -- flag_personal_loan   integer
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'CSV',
      field_delimiter = '\x01',
      null_marker = '\\N',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false,
      quote=""
    );

