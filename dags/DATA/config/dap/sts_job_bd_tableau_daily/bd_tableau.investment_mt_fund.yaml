  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: investment_mt_fund
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.investment_mt_fund
    (
    trx_date datetime, 
    trx_no string, 
    cust_cif string, 
    sales_nip string, 
    sales_nip_acct string, 
    sales_code string, 
    sales_code_acct string, 
    sales_name string, 
    sales_name_acct string, 
    branch_code string, 
    branch_code_acct string, 
    branch_name string, 
    branch_name_acct string, 
    bm_name string, 
    bm_name_acct string, 
    bm_code string, 
    bm_code_acct string, 
    am_name string, 
    am_name_acct string, 
    am_code string, 
    am_code_acct string, 
    is_name string, 
    is_name_acct string, 
    is_code string, 
    is_code_acct string, 
    stl_account_no string, 
    customer_name string, 
    product_code string, 
    product_name string, 
    ccy string, 
    trx_amount numeric, 
    net_amount numeric, 
    net_amount_idr numeric, 
    cur_rate numeric, 
    order_unit numeric, 
    fee_amount numeric, 
    fee_amount_idr numeric, 
    net_fee_amount numeric, 
    trx_type string, 
    trx_type_new string, 
    region string, 
    region_acct string, 
    product_group string, 
    product_group2 string, 
    nti_real string, 
    nti_flag string, 
    notes string, 
    year integer, 
    month integer, 
    month_short_name string, 
    day integer, 
    week_of_month string, 
    quarter int64, 
    lob string, 
    br_code_avantrade string, 
    br_name_avantrade string, 
    reg_class string, 
    position string, 
    note_drip string, 
    flag_nip_status string, 
    branch_code_ori string, 
    fee_amount_ori string, 
    notes_ori string, 
    upd_date string, 
    transactionstatus string, 
    tradedate2 string, 
    tradedate3 string, 
    tradedate4 string, 
    datepr_dt datetime
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'CSV',
      field_delimiter = '\x01',
      null_marker = '\\N',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false,
      quote=""
    );

