#BIG QUERY CONFIGURATION
temp_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: qris_merchant
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.qris_merchant
    (
      merchant_id string, 
      merchant_name string, 
      national_merchant_id string, 
      tanggal_aktif string, 
      status int64, 
      status_name string, 
      branch_code string, 
      region_code string, 
      nip_officer string, 
      mpan string, 
      groupname_mechant string, 
      merchant_city string, 
      mcc string, 
      badanhukum string, 
      merchant_postal_code string, 
      account_no_merchant numeric, 
      cif_merchant numeric, 
      cif_str_merchant string, 
      badanusaha string, 
      merchant_province string, 
      account_name string, 
      merchant_criteria string, 
      merchant_address string, 
      npwp string, 
      kelurahan_pic string, 
      kecamatan_pic string, 
      email_pic string, 
      pic_postal_code string, 
      pic_city string, 
      pic_nik string, 
      pic_name string, 
      pic_province string, 
      pic_address string, 
      pic_phone string, 
      ecifref string
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'CSV',
      field_delimiter = '\x01',
      null_marker = '\\N',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false,
      quote=""
    );

