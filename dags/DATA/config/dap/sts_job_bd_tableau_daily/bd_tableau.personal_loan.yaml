#BIG QUERY CONFIGURATION
temp_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: NONE
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    NONE

main_bigquery_table:
  server: NONE
  project_id: NONE
  dataset_id: NONE
  table_name: personal_loan
  last_update_date_column_source: NONE
  last_update_date_column_target: NONE
  transaction_date_column_target: NONE
  transaction_date_column_source: NONE
  table_header_dependency: NONE
  column_header_id_dependency: NONE
  column_line_id_dependency: NONE
  additional_table_source: | 
    , (select 1 from dual) ADDITIONAL
  additional_table_target: |
    , (select 1 limit 1) ADDITIONAL
  additional_where_source: AND 1=1
  additional_where_target: AND 1=1
  schema_fields: |
    CREATE OR REPLACE EXTERNAL TABLE v_dataset_id.personal_loan
    (
    nomor_loan string, 
    cif numeric, 
    tgl_pencairan_pinjaman date, 
    jumlah_pinjaman numeric, 
    jumlah_pinjaman_yang_diterima numeric, 
    jangka_waktu_pinjaman numeric, 
    tgl_pembayaran_terakhir date, 
    sisa_tenor float64, 
    pembayaran_ke float64, 
    rat_int_current numeric, 
    jumlah_bunga_berjalan numeric, 
    tgl_bunga_berjalan date, 
    tgl_angsuran_setiap_bulan string, 
    tgl_angsuran_pertama date, 
    tgl_angsuran_terakhir date, 
    jumlah_angsuran_per_bulan numeric, 
    no_rek_pembayaran string, 
    tipe_di string, 
    cod_acct_stat numeric, 
    cod_prod numeric, 
    cod_lob numeric, 
    os numeric, 
    amt_principal_first numeric, 
    amt_princ_bal_first numeric, 
    off_code string, 
    officer_name string, 
    ops_code string, 
    branch_code numeric, 
    branch_name string, 
    casid string, 
    casa_product_code numeric, 
    cod_acct_no string, 
    cod_cc_brn numeric, 
    casa_product_name string, 
    casa_branch_code numeric, 
    flg_psbook string, 
    bal_book numeric, 
    amt_hld numeric, 
    bal_acct_min_reqd numeric, 
    casa_status numeric, 
    funding_report_flag integer, 
    mis_code string, 
    subtype1 string, 
    ecifref string
    )
    WITH PARTITION COLUMNS 
    (
    date_pr string
    )
    WITH CONNECTION `v_connection`
    OPTIONS 
    (
      uris = ['gs://v_bucket/*'],
      format = 'CSV',
      field_delimiter = '\x01',
      null_marker = '\\N',
      hive_partition_uri_prefix = 'gs://v_bucket/',
      require_hive_partition_filter=false
    );

